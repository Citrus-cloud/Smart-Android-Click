# ClickFlow Android — Pre-alpha release builder
#
# PARKING NOTICE
# This workflow is parked at ci/release/android-release.yml because the
# Lindy assistant's GitHub OAuth grant does not include the `workflow`
# scope, which is required to write inside .github/workflows/.
#
# To activate it, run from your machine:
#
#     git mv ci/release/android-release.yml .github/workflows/android-release.yml
#     git commit -m "Step 60: activate android-release workflow"
#     git push
#
# After that, this workflow becomes runnable from the Actions tab via
# "Run workflow", or by re-pushing the tag `android-v0.1.0-prealpha`.
#
# What it does (simulation-only project; no real taps anywhere):
#   1. Checks out the repo at the chosen ref.
#   2. Sets up JDK 17 + Android SDK (cmdline-tools + platform-34 + build-tools 34.0.0).
#   3. Runs `./gradlew assembleDebug` to produce app-debug.apk.
#   4. Verifies the APK is the debug-signed pre-alpha (versionName 0.1.0-prealpha).
#   5. Re-confirms the manifest has 0 permissions / 0 providers / 0 services / 0 receivers.
#   6. Replaces the app-debug.apk asset on the existing pre-release
#      tag `android-v0.1.0-prealpha` with the rebuilt APK.
#
# It NEVER creates a non-prerelease, never release-signs, never pushes
# to a store. The pre-release tag and URL are preserved.

name: android-release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref to build (branch / tag / sha). Default: main."
        required: false
        default: "main"
      tag:
        description: "release tag whose app-debug.apk asset will be replaced."
        required: false
        default: "android-v0.1.0-prealpha"
  push:
    tags:
      - "android-v*-prealpha"

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build debug APK and refresh pre-release asset
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || 'android-v0.1.0-prealpha' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Locate APK
        id: apk
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "$APK" ]; then
            echo "::error::Expected APK not found at $APK"
            exit 1
          fi
          SIZE=$(stat -c%s "$APK")
          echo "path=$APK"   >> "$GITHUB_OUTPUT"
          echo "size=$SIZE"  >> "$GITHUB_OUTPUT"
          echo "Built APK: $APK ($SIZE bytes)"

      - name: Safety re-check — manifest declares no permissions/components
        run: |
          set -euo pipefail
          MAN="app/src/main/AndroidManifest.xml"
          test -f "$MAN" || { echo "::error::missing $MAN"; exit 1; }
          if grep -qE '<uses-permission' "$MAN"; then
            echo "::error::Manifest declares <uses-permission>. Step 60 forbids this."
            exit 1
          fi
          for tag in provider service receiver; do
            if grep -qE "<${tag}[[:space:]>]" "$MAN"; then
              echo "::error::Manifest declares <${tag}>. Step 60 forbids this."
              exit 1
            fi
          done
          echo "OK: 0 permissions, 0 providers, 0 services, 0 receivers."

      - name: Safety re-check — versionName is the pre-alpha
        run: |
          set -euo pipefail
          if ! grep -q 'versionName = "0.1.0-prealpha"' app/build.gradle.kts; then
            echo "::error::versionName is not 0.1.0-prealpha"
            exit 1
          fi

      - name: Replace pre-release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          APK="${{ steps.apk.outputs.path }}"

          REL_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")
          IS_PRERELEASE=$(echo "$REL_JSON" | jq -r '.prerelease')
          if [ "$IS_PRERELEASE" != "true" ]; then
            echo "::error::Release ${TAG} is not a pre-release. Refusing to replace its asset."
            exit 1
          fi

          ASSET_ID=$(echo "$REL_JSON" | jq -r '.assets[] | select(.name=="app-debug.apk") | .id')
          if [ -n "$ASSET_ID" ] && [ "$ASSET_ID" != "null" ]; then
            echo "Deleting existing asset id=$ASSET_ID"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${ASSET_ID}"
          fi

          gh release upload "${TAG}" "${APK}" --clobber
          echo "Uploaded $APK to release ${TAG}."
